<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--pink-light); display: flex; flex-direction: column; min-height: 100vh; }
    .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box {
      background: white; border-radius: 1.5rem; padding: 2.5rem;
      width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 4px 24px rgba(224, 122, 150, 0.15);
    }
    .login-box h1 { font-size: 1.5rem; color: var(--pink-dark); margin-bottom: 0.5rem; }
    .login-box p { color: #888; font-size: 0.9rem; line-height: 1.6; margin-bottom: 1rem; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #f0d6de;
      border-top-color: var(--pink-dark); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check {
      width: 52px; height: 52px; border-radius: 50%; background: #e8f8ef;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
    }
    .check svg { stroke: #27ae60; }
    .cross {
      width: 52px; height: 52px; border-radius: 50%; background: #fdecea;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;
    }
    .cross svg { stroke: #c0392b; }
    a.btn-link {
      display: inline-block; margin-top: 1rem; color: var(--pink-dark);
      font-size: 0.85rem; text-decoration: none;
    }
    a.btn-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="https://abundioscleaning.com" class="logo" style="text-decoration:none;display:flex;align-items:center;gap:0.35rem;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Abundios Cleaning</a>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">

      <div id="loading">
        <div class="spinner"></div>
        <p>Verifying your email...</p>
      </div>

      <div id="success" style="display:none">
        <div class="check">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h1>Email verified!</h1>
        <p>Your account is active. Redirecting you now...</p>
      </div>

      <div id="error" style="display:none">
        <div class="cross">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
        <h1 style="color:#c0392b">Link expired</h1>
        <p id="errorDetail">This verification link is invalid or has expired.</p>
        <a href="/register" class="btn-link">Create a new account →</a>
      </div>

    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    } else {
      fetch('/api/auth/verify-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      })
      .then(async res => {
        document.getElementById('loading').style.display = 'none';
        if (res.ok) {
          const data = await res.json();
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('role', data.role);
          localStorage.setItem('first_name', data.first_name);
          document.getElementById('success').style.display = 'block';
          setTimeout(() => {
            if (data.role === 'admin' || data.role === 'staff') {
              window.location.href = 'https://app.abundioscleaning.com/';
            } else {
              window.location.href = 'https://portal.abundioscleaning.com/';
            }
          }, 2000);
        } else {
          const data = await res.json().catch(() => ({}));
          document.getElementById('errorDetail').textContent = data.detail || 'This verification link is invalid or has expired.';
          document.getElementById('error').style.display = 'block';
        }
      })
      .catch(() => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
      });
    }
  </script>
</body>
</html>
