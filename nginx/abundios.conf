server {
    listen 80;
    server_name abundioscleaning.com www.abundioscleaning.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name abundioscleaning.com www.abundioscleaning.com;

    ssl_certificate     /etc/letsencrypt/live/abundioscleaning.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abundioscleaning.com/privkey.pem;

    root /home/ubuntu/AbundiosCleaning/frontend;
    index index.html;

    location /app/ {
        alias /home/ubuntu/AbundiosCleaning/dashboard/build/;
        try_files $uri $uri/ /app/index.html;
    }

    location /client/ {
        alias /home/ubuntu/AbundiosCleaning/client-portal/build/;
        try_files $uri $uri/ /client/index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /auth/google/callback {
        try_files /auth/google/callback.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
