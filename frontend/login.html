<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <style>
    body {
      background: var(--bg-alt);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: white;
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(17, 24, 39, 0.06);
    }
    .login-box h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .login-box .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .field {
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 0.75rem;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus {
      border-color: var(--red);
    }
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      padding-right: 2.8rem;
    }
    .pw-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: var(--red); }
    .btn-submit {
      width: 100%;
      background: var(--red);
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-submit:hover { background: var(--red-dk); transform: translateY(-1px); }
    .btn-submit:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
    }
    .btn-submit:disabled:hover { background: var(--border); transform: none; }
    .error-msg {
      color: var(--red);
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
    .forgot-link {
      display: none;
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: var(--red);
      text-decoration: none;
    }
    .forgot-link.visible { display: block; }
    .forgot-link:hover { text-decoration: underline; }
    .signup-line {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .signup-line a {
      color: var(--red);
      text-decoration: none;
      font-weight: 600;
    }
    .signup-line a:hover { text-decoration: underline; }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: white;
      color: var(--text);
      border: 1.5px solid var(--border);
      padding: 0.75rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { border-color: var(--red); box-shadow: 0 2px 8px rgba(233, 10, 70, 0.12); }
    .btn-google img { width: 20px; height: 20px; }

    nav .nav-inner { padding: 1.25rem 2rem; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--red);
      transition: color 0.2s;
    }
    .back-link svg.lucide { width: 26px; height: 26px; stroke-width: 2.5; }
    .back-wordmark {
      height: 36px;
      width: auto;
      display: block;
      transition: filter 0.2s;
    }
    .back-link:hover { color: var(--red-dk); }
    .back-link:hover .back-wordmark { filter: brightness(0.85); }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://abundioscleaning.com" class="back-link" aria-label="Back to Abundios Cleaning website">
        <i data-lucide="chevron-left"></i>
        <img src="https://abundioscleaning.com/wordmark.svg" alt="Abundios Cleaning" class="back-wordmark" />
      </a>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in with your email or username</p>

      <div class="field">
        <label>Email or Username</label>
        <input type="text" id="identifier" placeholder="Enter your email or username" />
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" />
          <button type="button" class="pw-toggle" onclick="togglePw()" tabindex="-1" id="pwToggle">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" id="submitBtn" onclick="login()" disabled>Continue</button>
      <p class="error-msg" id="errorMsg">Incorrect email/username or password.</p>
      <a href="/forgot-password" class="forgot-link" id="forgotLink">Forgot password?</a>

      <p class="signup-line">Don't have an account? <a href="/register">Sign up</a></p>

      <div class="divider">or</div>

      <button class="btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Continue with Google
      </button>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      const id  = document.getElementById('identifier');
      const pw  = document.getElementById('password');
      const btn = document.getElementById('submitBtn');
      const sync = () => { btn.disabled = !(id.value.trim() && pw.value.trim()); };
      id.addEventListener('input', sync);
      pw.addEventListener('input', sync);
      sync();
    });

    function togglePw() {
      const input = document.getElementById('password');
      const eye   = document.getElementById('eyeIcon');
      const eyeOff = document.getElementById('eyeOffIcon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      eye.style.display    = show ? 'none'  : '';
      eyeOff.style.display = show ? ''      : 'none';
    }

    async function login() {
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value.trim();
      const errorMsg   = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = res.status === 403
            ? (data.detail || 'Please verify your email before signing in. Check your inbox.')
            : 'Incorrect email/username or password.';
          errorMsg.style.display = 'block';
          document.getElementById('forgotLink').classList.add('visible');
          return;
        }

        const data = await res.json();
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('first_name', data.first_name);

        if (data.role === 'admin' || data.role === 'staff') {
          window.location.href = 'https://app.abundioscleaning.com/';
        } else {
          const q = new URLSearchParams({
            token: data.access_token,
            role: data.role,
            first_name: data.first_name || '',
          });
          window.location.href = 'https://portal.abundioscleaning.com/?' + q.toString();
        }
      } catch (e) {
        errorMsg.style.display = 'block';
        document.getElementById('forgotLink').classList.add('visible');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !document.getElementById('submitBtn').disabled) login();
    });

    function googleLogin() {
      const clientId = '52874344580-o0slf4g1rao4mss8g0opffoecfk5nd17.apps.googleusercontent.com';
      const redirectUri = encodeURIComponent('https://app.abundioscleaning.com/auth/google/callback');
      const scope = encodeURIComponent('openid email profile');
      window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}`;
    }
  </script>

</body>
</html>
