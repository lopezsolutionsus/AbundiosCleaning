services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: abundios
      POSTGRES_USER: abundios_user
      POSTGRES_PASSWORD: abundios2026#
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abundios_user -d abundios"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://abundios_user:abundios2026#@db/abundios
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
