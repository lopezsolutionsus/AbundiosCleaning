<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Email | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <style>
    body {
      background: var(--bg-alt);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    nav .nav-inner { padding: 1.25rem 2rem; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      color: var(--red);
      transition: color 0.2s;
    }
    .back-link svg.lucide { width: 26px; height: 26px; stroke-width: 2.5; }
    .back-wordmark { height: 36px; width: auto; display: block; transition: filter 0.2s; }
    .back-link:hover { color: var(--red-dk); }
    .back-link:hover .back-wordmark { filter: brightness(0.85); }

    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: white;
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(17, 24, 39, 0.06);
    }
    .login-box h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .login-box p {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn-submit {
      display: inline-block;
      background: var(--red);
      color: white;
      border: none;
      padding: 0.75rem 1.75rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-submit:hover { background: var(--red-dk); transform: translateY(-1px); }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://abundioscleaning.com" class="back-link" aria-label="Back to Abundios Cleaning website">
        <i data-lucide="chevron-left"></i>
        <img src="https://abundioscleaning.com/wordmark.svg" alt="Abundios Cleaning" class="back-wordmark" />
      </a>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <h1>Verify your email</h1>
      <p>We've moved to code-based verification. Sign up again to receive a 6-digit code, or go back to sign in if your account is already active.</p>
      <a href="/login" class="btn-submit">Back to sign in</a>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => lucide.createIcons());
  </script>
</body>
</html>
