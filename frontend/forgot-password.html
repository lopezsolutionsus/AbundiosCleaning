<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--pink-light); display: flex; flex-direction: column; min-height: 100vh; }
    .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box {
      background: white; border-radius: 1.5rem; padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(224, 122, 150, 0.15);
    }
    .login-box h1 { font-size: 1.5rem; color: var(--pink-dark); margin-bottom: 0.5rem; text-align: center; }
    .login-box .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 0.4rem; }
    .field input {
      width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #f0d6de;
      border-radius: 0.75rem; font-size: 1rem; outline: none; transition: border 0.2s; box-sizing: border-box;
    }
    .field input:focus { border-color: var(--pink-dark); }
    .btn-submit {
      width: 100%; background: var(--pink-dark); color: white; border: none;
      padding: 0.85rem; border-radius: 999px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
    }
    .btn-submit:hover { background: #c5607a; }
    .btn-submit:disabled { background: #e0a0b0; cursor: not-allowed; }
    .error-msg { color: #c0392b; font-size: 0.85rem; text-align: center; margin-top: 1rem; display: none; }
    .success-msg { color: #27ae60; font-size: 0.9rem; text-align: center; margin-top: 1rem; display: none; }
    .links { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-top: 1.5rem; }
    .links a { font-size: 0.85rem; color: var(--pink-dark); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <span class="logo">Abundios Cleaning</span>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <h1>Reset password</h1>
      <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>

      <div id="formArea">
        <div class="field">
          <label>Email address</label>
          <input type="email" id="email" placeholder="john@example.com" />
        </div>
        <button class="btn-submit" id="sendBtn" onclick="sendReset()">Send reset link</button>
        <p class="error-msg" id="errorMsg"></p>
      </div>

      <p class="success-msg" id="successMsg">
        If that email is registered, you'll receive a reset link shortly. Check your inbox.
      </p>

      <div class="links">
        <a href="/login">← Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    async function sendReset() {
      const email    = document.getElementById('email').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!email) {
        errorMsg.textContent = 'Please enter your email address.';
        errorMsg.style.display = 'block';
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } catch (e) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendReset();
    });
  </script>
</body>
</html>
