# app.abundioscleaning.com — Admin/Staff Dashboard + Auth pages
server {
    listen 80;
    server_name app.abundioscleaning.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.abundioscleaning.com;

    ssl_certificate     /etc/letsencrypt/live/app.abundioscleaning.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.abundioscleaning.com/privkey.pem;

    root /home/ubuntu/AbundiosCleaning/dashboard/build;

    location = /login.html     { root /home/ubuntu/AbundiosCleaning/frontend; }
    location = /register.html  { root /home/ubuntu/AbundiosCleaning/frontend; }
    location = /verify-phone.html { root /home/ubuntu/AbundiosCleaning/frontend; }
    location = /style.css      { root /home/ubuntu/AbundiosCleaning/frontend; }
    location /auth/ {
        root /home/ubuntu/AbundiosCleaning/frontend;
        try_files $uri $uri.html =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

