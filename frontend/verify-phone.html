<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify Phone | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
  <style>
    body { background: var(--pink-light); display: flex; flex-direction: column; min-height: 100vh; }
    .wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .box {
      background: white; border-radius: 1.5rem; padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(224, 122, 150, 0.15);
    }
    .box h1 { font-size: 1.5rem; color: var(--pink-dark); margin-bottom: 0.5rem; text-align: center; }
    .box .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 0.4rem; }
    .phone-wrap { display: flex; align-items: center; border: 1.5px solid #f0d6de; border-radius: 0.75rem; overflow: hidden; transition: border 0.2s; }
    .phone-wrap:focus-within { border-color: var(--pink-dark); }
    .phone-prefix { padding: 0.75rem 0.75rem 0.75rem 1rem; color: #555; font-size: 1rem; background: #fdf5f7; border-right: 1.5px solid #f0d6de; user-select: none; }
    .phone-wrap input { flex: 1; padding: 0.75rem; border: none; outline: none; font-size: 1rem; }
    .field input[type=text] {
      width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #f0d6de;
      border-radius: 0.75rem; font-size: 1rem; outline: none; transition: border 0.2s; box-sizing: border-box;
    }
    .field input[type=text]:focus { border-color: var(--pink-dark); }
    .btn { width: 100%; background: var(--pink-dark); color: white; border: none; padding: 0.85rem; border-radius: 999px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
    .btn:hover { background: #c5607a; }
    .btn:disabled { background: #e0a0b0; cursor: not-allowed; }
    .error-msg { color: #c0392b; font-size: 0.85rem; text-align: center; margin-top: 1rem; display: none; }
    .success-msg { color: #27ae60; font-size: 0.85rem; text-align: center; margin-top: 1rem; display: none; }
    #step2 { display: none; }
    .resend { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #888; }
    .resend a { color: var(--pink-dark); cursor: pointer; text-decoration: none; }
    .resend a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="https://abundioscleaning.com" class="logo" style="text-decoration:none;display:flex;align-items:center;gap:0.35rem;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Abundios Cleaning</a>
    </div>
  </nav>

  <div class="wrap">
    <div class="box">
      <h1>Verify your phone</h1>
      <p class="subtitle">We'll send a 6-digit code to confirm your number</p>

      <!-- Step 1: Enter phone -->
      <div id="step1">
        <div class="field">
          <label>US Phone Number</label>
          <div class="phone-wrap">
            <span class="phone-prefix">+1</span>
            <input type="tel" id="phone" placeholder="(434) 000-0000" maxlength="14" />
          </div>
        </div>
        <button class="btn" id="sendBtn" onclick="sendCode()">Send Code</button>
      </div>

      <!-- Step 2: Enter code -->
      <div id="step2">
        <div class="field">
          <label>6-digit verification code</label>
          <input type="text" id="code" placeholder="Enter the code" maxlength="6" />
        </div>
        <button class="btn" id="verifyBtn" onclick="verifyCode()">Verify</button>
        <div class="resend">Didn't receive it? <a onclick="backToPhone()">Try again</a></div>
      </div>

      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    let currentPhone = '';

    function getPhone() {
      return document.getElementById('phone').value.replace(/\D/g, '');
    }

    async function sendCode() {
      const phone = getPhone();
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';

      if (phone.length !== 10) {
        errorMsg.textContent = 'Please enter a valid 10-digit US phone number.';
        errorMsg.style.display = 'block';
        return;
      }

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      try {
        const res = await fetch('/api/auth/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ phone }),
        });
        if (!res.ok) {
          const data = await res.json();
          errorMsg.textContent = data.detail || 'Failed to send code.';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Send Code';
          return;
        }
        currentPhone = phone;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        successMsg.textContent = 'Code sent! Check your messages.';
        successMsg.style.display = 'block';
      } catch (e) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Send Code';
      }
    }

    async function verifyCode() {
      const code = document.getElementById('code').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (code.length !== 6) {
        errorMsg.textContent = 'Please enter the 6-digit code.';
        errorMsg.style.display = 'block';
        return;
      }

      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const res = await fetch('/api/auth/verify-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ phone: currentPhone, code }),
        });
        if (!res.ok) {
          const data = await res.json();
          errorMsg.textContent = data.detail || 'Incorrect code. Please try again.';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Verify';
          return;
        }
        const role = localStorage.getItem('role');
        if (role === 'admin' || role === 'staff') {
          window.location.href = 'https://app.abundioscleaning.com/';
        } else {
          window.location.href = 'https://portal.abundioscleaning.com/';
        }
      } catch (e) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Verify';
      }
    }

    function backToPhone() {
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step1').style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('sendBtn').textContent = 'Send Code';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('step2').style.display === 'block') verifyCode();
        else sendCode();
      }
    });
  </script>
</body>
</html>
