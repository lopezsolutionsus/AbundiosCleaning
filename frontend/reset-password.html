<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--pink-light); display: flex; flex-direction: column; min-height: 100vh; }
    .login-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box {
      background: white; border-radius: 1.5rem; padding: 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(224, 122, 150, 0.15);
    }
    .login-box h1 { font-size: 1.5rem; color: var(--pink-dark); margin-bottom: 0.5rem; text-align: center; }
    .login-box .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .field { margin-bottom: 1.2rem; }
    .field label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 0.4rem; }
    .field input {
      width: 100%; padding: 0.75rem 1rem; border: 1.5px solid #f0d6de;
      border-radius: 0.75rem; font-size: 1rem; outline: none; transition: border 0.2s; box-sizing: border-box;
    }
    .field input:focus { border-color: var(--pink-dark); }
    .btn-submit {
      width: 100%; background: var(--pink-dark); color: white; border: none;
      padding: 0.85rem; border-radius: 999px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 0.5rem; transition: background 0.2s;
    }
    .btn-submit:hover { background: #c5607a; }
    .btn-submit:disabled { background: #e0a0b0; cursor: not-allowed; }
    .error-msg { color: #c0392b; font-size: 0.85rem; text-align: center; margin-top: 1rem; display: none; }
    .success-msg { color: #27ae60; font-size: 0.9rem; text-align: center; margin-top: 1rem; display: none; }
    .invalid-msg { text-align: center; color: #c0392b; margin-top: 2rem; display: none; }
    .invalid-msg a { color: var(--pink-dark); text-decoration: none; }
    .invalid-msg a:hover { text-decoration: underline; }
    .links { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; margin-top: 1.5rem; }
    .links a { font-size: 0.85rem; color: var(--pink-dark); text-decoration: none; }
    .links a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <span class="logo">Abundios Cleaning</span>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <h1>New password</h1>
      <p class="subtitle">Choose a strong password for your account.</p>

      <div id="formArea">
        <div class="field">
          <label>New password</label>
          <input type="password" id="password" placeholder="At least 6 characters" />
        </div>
        <div class="field">
          <label>Confirm new password</label>
          <input type="password" id="confirm" placeholder="Repeat your password" />
        </div>
        <button class="btn-submit" id="saveBtn" onclick="savePassword()">Save new password</button>
        <p class="error-msg" id="errorMsg"></p>
      </div>

      <p class="success-msg" id="successMsg">
        Your password has been updated. <a href="/login" style="color:var(--pink-dark);">Sign in now →</a>
      </p>

      <p class="invalid-msg" id="invalidMsg">
        This reset link is invalid or has expired.<br />
        <a href="/forgot-password">Request a new one →</a>
      </p>

      <div class="links" id="backLink">
        <a href="/login">← Back to sign in</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('formArea').style.display = 'none';
      document.querySelector('.subtitle').style.display = 'none';
      document.getElementById('invalidMsg').style.display = 'block';
    }

    async function savePassword() {
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });

        if (!res.ok) {
          const data = await res.json();
          errorMsg.textContent = data.detail || 'Failed to reset password.';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Save new password';
          if (res.status === 400 && data.detail?.includes('expired')) {
            document.getElementById('formArea').style.display = 'none';
            document.querySelector('.subtitle').style.display = 'none';
            document.getElementById('invalidMsg').style.display = 'block';
          }
          return;
        }

        document.getElementById('formArea').style.display = 'none';
        document.getElementById('backLink').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
      } catch (e) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Save new password';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') savePassword();
    });
  </script>
</body>
</html>
