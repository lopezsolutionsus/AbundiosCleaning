<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--pink-light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(224, 122, 150, 0.15);
    }
    .login-box h1 {
      font-size: 1.5rem;
      color: var(--pink-dark);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .login-box .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .field {
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #f0d6de;
      border-radius: 0.75rem;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus {
      border-color: var(--pink-dark);
    }
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input {
      padding-right: 2.8rem;
    }
    .pw-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #aaa;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .pw-toggle:hover { color: var(--pink-dark); }
    .btn-submit {
      width: 100%;
      background: var(--pink-dark);
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #c5607a; }
    .error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }
    .links a {
      font-size: 0.85rem;
      color: var(--pink-dark);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: #bbb;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f0d6de;
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: white;
      color: #444;
      border: 1.5px solid #f0d6de;
      padding: 0.75rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { border-color: #c5607a; box-shadow: 0 2px 8px rgba(224,122,150,0.15); }
    .btn-google img { width: 20px; height: 20px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://abundioscleaning.com" class="logo" style="text-decoration:none;display:flex;align-items:center;gap:0.35rem;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Abundios Cleaning</a>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in with your email or username</p>

      <div class="field">
        <label>Email or Username</label>
        <input type="text" id="identifier" placeholder="Enter your email or username" />
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" />
          <button type="button" class="pw-toggle" onclick="togglePw()" tabindex="-1" id="pwToggle">
            <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eyeOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" onclick="login()">Sign In</button>
      <p class="error-msg" id="errorMsg">Incorrect email/username or password.</p>

      <div class="divider">or</div>

      <button class="btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign in with Google
      </button>


      <div class="links">
        <a href="/forgot-password">Forgot your password?</a>
        <a href="/register">Don't have an account? Sign up</a>
        <a href="https://abundioscleaning.com">← Back to website</a>
      </div>
    </div>
  </div>

  <script>
    function togglePw() {
      const input = document.getElementById('password');
      const eye   = document.getElementById('eyeIcon');
      const eyeOff = document.getElementById('eyeOffIcon');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      eye.style.display    = show ? 'none'  : '';
      eyeOff.style.display = show ? ''      : 'none';
    }

    async function login() {
      const identifier = document.getElementById('identifier').value.trim();
      const password   = document.getElementById('password').value.trim();
      const errorMsg   = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          errorMsg.textContent = res.status === 403
            ? (data.detail || 'Please verify your email before signing in. Check your inbox.')
            : 'Incorrect email/username or password.';
          errorMsg.style.display = 'block';
          return;
        }

        const data = await res.json();
        localStorage.setItem('token', data.access_token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('first_name', data.first_name);

        if (data.role === 'admin' || data.role === 'staff') {
          window.location.href = 'https://app.abundioscleaning.com/';
        } else {
          window.location.href = 'https://portal.abundioscleaning.com/';
        }
      } catch (e) {
        errorMsg.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function googleLogin() {
      const clientId = '52874344580-o0slf4g1rao4mss8g0opffoecfk5nd17.apps.googleusercontent.com';
      const redirectUri = encodeURIComponent('https://app.abundioscleaning.com/auth/google/callback');
      const scope = encodeURIComponent('openid email profile');
      window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}`;
    }
  </script>

</body>
</html>
