<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Abundios Cleaning</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--pink-light);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(224, 122, 150, 0.15);
    }
    .login-box h1 {
      font-size: 1.5rem;
      color: var(--pink-dark);
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .login-box .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .field {
      margin-bottom: 1.2rem;
    }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #555;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #f0d6de;
      border-radius: 0.75rem;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    .field input:focus { border-color: var(--pink-dark); }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .btn-submit {
      width: 100%;
      background: var(--pink-dark);
      color: white;
      border: none;
      padding: 0.85rem;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-submit:hover { background: #c5607a; }
    .error-msg {
      color: #c0392b;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      display: none;
    }
    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }
    .links a {
      font-size: 0.85rem;
      color: var(--pink-dark);
      text-decoration: none;
    }
    .links a:hover { text-decoration: underline; }
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: #bbb;
      font-size: 0.85rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #f0d6de;
    }
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: white;
      color: #444;
      border: 1.5px solid #f0d6de;
      padding: 0.75rem;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .btn-google:hover { border-color: #c5607a; box-shadow: 0 2px 8px rgba(224,122,150,0.15); }
    .btn-google img { width: 20px; height: 20px; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="https://abundioscleaning.com" class="logo" style="text-decoration:none;display:flex;align-items:center;gap:0.35rem;"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Abundios Cleaning</a>
    </div>
  </nav>

  <div class="login-wrap">
    <div class="login-box">
      <h1>Create account</h1>
      <p class="subtitle">Join Abundios Cleaning</p>

      <div class="row">
        <div class="field">
          <label>First Name <span style="color:var(--pink-dark)">*</span></label>
          <input type="text" id="first_name" placeholder="John" />
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="last_name" placeholder="Doe" />
        </div>
      </div>

      <div class="field">
        <label>Email <span style="color:var(--pink-dark)">*</span></label>
        <input type="email" id="email" placeholder="john@example.com" />
      </div>

      <div class="field">
        <label>Phone <span style="font-weight:400;color:#bbb;font-size:0.8rem;">(optional)</span></label>
        <input type="tel" id="phone" placeholder="(434) 000-0000" />
      </div>

      <div class="field">
        <label>Password <span style="color:var(--pink-dark)">*</span></label>
        <input type="password" id="password" placeholder="At least 6 characters" />
      </div>

      <div class="field">
        <label>Confirm Password <span style="color:var(--pink-dark)">*</span></label>
        <input type="password" id="confirm_password" placeholder="Repeat your password" />
      </div>

      <button class="btn-submit" onclick="register()">Create Account</button>
      <p class="error-msg" id="errorMsg"></p>

      <div class="divider">or</div>

      <button class="btn-google" onclick="googleLogin()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign up with Google
      </button>


      <div class="links">
        <a href="/login">Already have an account? Sign in</a>
        <a href="https://abundioscleaning.com">← Back to website</a>
      </div>
    </div>
  </div>

  <script>
    async function register() {
      const first_name       = document.getElementById('first_name').value.trim();
      const last_name        = document.getElementById('last_name').value.trim();
      const email            = document.getElementById('email').value.trim();
      const phone            = document.getElementById('phone').value.trim();
      const password         = document.getElementById('password').value.trim();
      const confirm_password = document.getElementById('confirm_password').value.trim();
      const errorMsg         = document.getElementById('errorMsg');

      errorMsg.style.display = 'none';

      if (!first_name || !email || !password) {
        errorMsg.textContent = 'Please fill in all required fields.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password !== confirm_password) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ first_name, last_name, email, phone, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorMsg.textContent = data.detail || 'Registration failed.';
          errorMsg.style.display = 'block';
          return;
        }

        document.querySelector('.login-box').innerHTML = `
          <h1 style="font-size:1.4rem;color:var(--pink-dark);margin-bottom:0.5rem;text-align:center">Check your email</h1>
          <p style="text-align:center;color:#888;font-size:0.9rem;margin-bottom:1.5rem">We sent a confirmation link to</p>
          <p style="text-align:center;font-weight:600;color:#333;font-size:1rem;margin-bottom:1.5rem">${data.email}</p>
          <p style="text-align:center;color:#aaa;font-size:0.82rem;line-height:1.6">Click the link in the email to activate your account.<br>Don't forget to check your spam folder.</p>
          <div style="text-align:center;margin-top:1.5rem">
            <a href="/login" style="color:var(--pink-dark);font-size:0.85rem;text-decoration:none">← Back to sign in</a>
          </div>
        `;

      } catch (e) {
        errorMsg.textContent = 'Something went wrong. Please try again.';
        errorMsg.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') register();
    });

    function googleLogin() {
      const clientId = '52874344580-o0slf4g1rao4mss8g0opffoecfk5nd17.apps.googleusercontent.com';
      const redirectUri = encodeURIComponent('https://app.abundioscleaning.com/auth/google/callback');
      const scope = encodeURIComponent('openid email profile');
      window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=${scope}`;
    }
  </script>

</body>
</html>
